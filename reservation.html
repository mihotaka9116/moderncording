<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>空室検索結果 | 遠野モダンリトリート</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Montserrat:wght@400;600;700&family=Noto+Serif+JP:wght@400;500;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    <link href="style.css" rel="stylesheet">
</head>
<body class="reservation-page">

<header class="header">
    </header>

<div style="width: 100%; overflow: hidden;">
    <main class="w-container" style="padding-top: 80px; padding-bottom: 100px;">
        </main>
</div>

<footer class="footer">
    </footer>

<script>
    // ハンバーガーメニューの制御
    const navbtn = document.querySelector('.navbtn');
    const html = document.querySelector('html');
    if (navbtn) {
        navbtn.addEventListener('click', () => { html.classList.toggle('open'); });
    }

    // スクロールアニメーションの制御
    const observeAnimation = () => {
        const targets = document.querySelectorAll('.js-fade');
        const options = { threshold: 0.2 };
        const observer = new IntersectionObserver((entries) => {
            entries.forEach(entry => {
                if (entry.isIntersecting) { entry.target.classList.add('is-show'); }
            });
        }, options);
        targets.forEach(target => observer.observe(target));
    };
    observeAnimation();
</script>
</body>
</html>
